<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Ansush Cryptocurrency Price Prediction Team" />
    <title>Login - Ansush Cryptocurrency Price Prediction</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
        color: #e5e7eb;
        min-height: 100vh;
      }

      .topbar {
        width: 100%;
        background: rgba(15, 23, 42, 0.94);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .topbar-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 18px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, #2563eb, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
      }

      .brand h1 {
        font-size: 1.18rem;
        font-weight: 800;
      }

      .brand span {
        color: #38bdf8;
      }

      .nav-links {
        display: flex;
        gap: 24px;
      }

      .nav-links a {
        color: #cbd5e1;
        text-decoration: none;
        font-weight: 500;
      }

      .nav-links a:hover {
        color: #38bdf8;
      }

      .page-wrapper {
        min-height: calc(100vh - 82px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .login-card {
        width: 100%;
        max-width: 520px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 24px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
        padding: 36px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 28px;
      }

      .login-header h2 {
        font-size: 1.95rem;
        font-weight: 800;
        margin-bottom: 10px;
      }

      .login-header p {
        color: #94a3b8;
        font-size: 0.97rem;
        line-height: 1.6;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #e2e8f0;
      }

      .input-group {
        position: relative;
      }

      .input-group .left-icon {
        position: absolute;
        top: 50%;
        left: 14px;
        transform: translateY(-50%);
        color: #94a3b8;
      }

      .input-group input {
        width: 100%;
        padding: 14px 14px 14px 42px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(30, 41, 59, 0.92);
        color: #f8fafc;
        font-size: 0.96rem;
        outline: none;
      }

      .input-group input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.14);
      }

      .toggle-password {
        position: absolute;
        top: 50%;
        right: 14px;
        transform: translateY(-50%);
        color: #94a3b8;
        cursor: pointer;
      }

      .feedback {
        margin: 14px 0 18px;
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 0.92rem;
        display: none;
      }

      .feedback.error {
        display: block;
        background: rgba(239, 68, 68, 0.12);
        color: #fecaca;
        border: 1px solid rgba(239, 68, 68, 0.25);
      }

      .feedback.success {
        display: block;
        background: rgba(34, 197, 94, 0.12);
        color: #bbf7d0;
        border: 1px solid rgba(34, 197, 94, 0.25);
      }

      .login-btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 14px 18px;
        font-size: 1rem;
        font-weight: 700;
        color: white;
        cursor: pointer;
        background: linear-gradient(135deg, #2563eb, #0891b2);
      }

      .login-btn:hover {
        box-shadow: 0 16px 30px rgba(37, 99, 235, 0.28);
      }

      .register-link {
        margin-top: 20px;
        text-align: center;
        color: #94a3b8;
        font-size: 0.95rem;
      }

      .register-link a {
        color: #38bdf8;
        text-decoration: none;
        font-weight: 600;
      }

      .register-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-icon">
            <i class="fas fa-chart-line"></i>
          </div>
          <h1>Ansush <span>Cryptocurrency Price Prediction</span></h1>
        </div>

        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="about.html">About</a>
          <a href="register.html">Register</a>
        </nav>
      </div>
    </header>

    <main class="page-wrapper">
      <section class="login-card">
        <div class="login-header">
          <h2>Welcome Back</h2>
          <p>
            Sign in to access the Ansush Cryptocurrency Price Prediction
            platform.
          </p>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-group">
              <i class="fas fa-envelope left-icon"></i>
              <input type="email" id="email" name="email" required />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-group">
              <i class="fas fa-lock left-icon"></i>
              <input type="password" id="password" name="password" required />
              <i class="fas fa-eye toggle-password"></i>
            </div>
          </div>

          <div id="feedback" class="feedback" role="alert"></div>

          <button type="submit" class="login-btn">
            <span>Sign In</span>
          </button>
        </form>

        <p class="register-link">
          Do not have an account? <a href="register.html">Register here</a>
        </p>
      </section>
    </main>

    <script src="../js/login.js" defer></script>
  </body>
</html>
